<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hour AI | Emergency Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-800 p-4 bg-slate-900 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 p-2 rounded-lg"><i class="fas fa-heartbeat text-white"></i></div>
            <span class="font-bold tracking-tighter text-xl uppercase italic">Golden Hour <span class="text-red-500">AI</span></span>
        </div>
        <div class="flex gap-2">
            <button onclick="switchTab('user')" class="px-4 py-1.5 text-xs font-bold bg-slate-800 rounded-full hover:bg-slate-700 transition">SOS PORTAL</button>
            <button onclick="switchTab('hospital')" class="px-4 py-1.5 text-xs font-bold bg-slate-800 rounded-full hover:bg-slate-700 transition">HOSPITAL FEED</button>
        </div>
    </nav>

    <main id="user-tab" class="max-w-xl mx-auto p-6 animate-in">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2 tracking-tight">EMERGENCY ASSISTANT</h1>
            <p class="text-slate-400">Real-time AI triage and life-saving instructions.</p>
        </div>

        <div id="sos-btn" onclick="document.getElementById('desc').focus()" class="pulse w-32 h-32 bg-red-600 rounded-full mx-auto mb-8 flex items-center justify-center cursor-pointer border-4 border-red-500 shadow-2xl hover:scale-105 transition">
            <span class="font-black text-2xl text-white">SOS</span>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
            <label class="block text-sm font-bold text-slate-500 mb-2 uppercase">Identify the Emergency</label>
            <textarea id="desc" placeholder="Describe what's happening... (e.g. Someone is having a seizure)" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:ring-2 focus:ring-red-500 outline-none h-32 mb-4"></textarea>
            
            <button onclick="sendEmergency()" id="submit-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl transition-all flex items-center justify-center gap-3 uppercase shadow-lg">
                <i class="fas fa-bolt"></i> Get Immediate Help
            </button>
        </div>

        <div id="response-card" class="hidden mt-6 bg-white rounded-2xl p-6 border-l-8 border-red-600 shadow-2xl animate-in">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-slate-900 font-black text-lg uppercase tracking-tighter">AI Responder Instructions</h3>
                <span class="bg-red-100 text-red-700 text-[10px] font-black px-2 py-1 rounded-full uppercase">Audio Priority</span>
            </div>
            <p id="ai-text" class="text-slate-800 text-xl leading-relaxed font-bold mb-4"></p>
            <div class="text-[10px] text-slate-400 border-t pt-4 font-bold uppercase tracking-widest">Medical dispatch notified • Keep your phone near</div>
        </div>
    </main>

    <main id="hospital-tab" class="hidden max-w-5xl mx-auto p-6 animate-in">
        <div class="flex items-center justify-between mb-8 text-blue-400">
            <h2 class="text-2xl font-black uppercase"><i class="fas fa-tower-broadcast mr-2"></i>Live Dispatch Monitor</h2>
            <div class="text-[10px] font-bold bg-blue-900/30 px-3 py-1 rounded-full border border-blue-800 animate-pulse uppercase">Network Online</div>
        </div>
        <div class="grid gap-4" id="feed-container">
            </div>
    </main>

    <script>
        const N8N_WEBHOOK_URL = "https://bb101.app.n8n.cloud/webhook/emergency-trigger";
        const ELEVEN_LABS_KEY = "sk_1b6fb7dc68678a9bcb24a7f50ccad3a2b0433c3a8c13ac3b";
        const VOICE_ID = 'EXAVITQu4vr4xnSDxMaL'; // Bella (Professional medical tone)

        let locationData = "Locating...";

        // Capture GPS Coordinates
        navigator.geolocation.getCurrentPosition(p => {
            locationData = `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
        }, () => { locationData = "Location Restricted"; });

        function switchTab(tab) {
            document.getElementById('user-tab').classList.toggle('hidden', tab !== 'user');
            document.getElementById('hospital-tab').classList.toggle('hidden', tab !== 'hospital');
        }

        async function sendEmergency() {
            const desc = document.getElementById('desc').value;
            const btn = document.getElementById('submit-btn');

            if (!desc) return alert("Please provide details.");

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Analyzing Incident...`;

            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        incident: desc, 
                        location: locationData,
                        timestamp: new Date().toLocaleTimeString() 
                    })
                });
                
                const data = await res.json();
                const aiResponse = data.ai_response || "Processing emergency data...";

                // Update UI
                document.getElementById('response-card').classList.remove('hidden');
                document.getElementById('ai-text').innerText = aiResponse;

                // Trigger Professional Voice
                handleVoice(aiResponse);

                // Update Hospital Feed
                updateHospitalFeed(desc, aiResponse);

            } catch (e) {
                alert("Connection lost. Please check n8n status.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-bolt"></i> Get Immediate Help`;
            }
        }

        async function handleVoice(text) {
            try {
                const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                    method: 'POST',
                    headers: { 'xi-api-key': ELEVEN_LABS_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: text, 
                        model_id: "eleven_monolingual_v1",
                        voice_settings: { stability: 0.6, similarity_boost: 0.8 }
                    })
                });
                if (!res.ok) throw new Error("Voice API limit or error");
                const blob = await res.blob();
                new Audio(URL.createObjectURL(blob)).play();
            } catch (err) {
                // Fallback to basic system voice if API fails
                const msg = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(msg);
            }
        }

        function updateHospitalFeed(incident, response) {
            const container = document.getElementById('feed-container');
            const div = document.createElement('div');
            div.className = "bg-slate-900 p-5 rounded-xl border-l-4 border-red-600 flex justify-between items-center shadow-lg animate-in mb-3";
            div.innerHTML = `
                <div>
                    <div class="text-[10px] text-red-500 font-black uppercase mb-1">Incoming Incident</div>
                    <div class="font-bold text-lg text-white">${incident}</div>
                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest"><i class="fas fa-map-pin mr-1"></i> ${locationData}</div>
                </div>
                <div class="text-right">
                    <button class="bg-blue-600 text-white px-5 py-2 rounded-lg text-xs font-black uppercase tracking-tighter">Respond</button>
                </div>
            `;
            container.prepend(div);
        }
    </script>
</body>
</html>
