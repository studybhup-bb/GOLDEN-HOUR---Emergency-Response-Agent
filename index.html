<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hour AI | Emergency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">

    <nav class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
        <span class="font-bold text-red-500 underline decoration-2">GOLDEN HOUR AI</span>
        <button onclick="switchTab()" class="text-xs bg-slate-800 px-3 py-1 rounded">Switch View</button>
    </nav>

    <main id="user-view" class="max-w-md mx-auto p-6">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
            <textarea id="incident" placeholder="What is the emergency?" class="w-full bg-black p-4 rounded-xl border border-slate-700 mb-4 h-32 focus:border-red-500 outline-none"></textarea>
            <button onclick="triggerSOS()" id="sos-btn" class="w-full bg-red-600 py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-red-700 transition">Activate Response</button>
        </div>

        <div id="response-box" class="hidden mt-6 bg-white text-slate-900 p-6 rounded-2xl border-l-8 border-red-600 animate-pulse">
            <h2 class="font-black text-sm text-red-600 mb-2 uppercase">Instructions</h2>
            <p id="ai-msg" class="text-xl font-bold leading-tight"></p>
        </div>
    </main>

    <script>
        // NOTE: Use PRODUCTION URL (remove -test) if you want it to stay alive!
        const WEBHOOK_URL = "https://bb101.app.n8n.cloud/webhook/emergency-trigger"; 
        const EL_KEY = "sk_1b6fb7dc68678a9bcb24a7f50ccad3a2b0433c3a8c13ac3b";

        async function triggerSOS() {
            const btn = document.getElementById('sos-btn');
            const msg = document.getElementById('incident').value;
            if(!msg) return alert("Please enter details");

            btn.disabled = true;
            btn.innerText = "TRIAGING...";

            // 1. Get Location
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const coords = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                await sendData(msg, coords);
            }, async () => {
                await sendData(msg, "Location Denied");
            });
        }

        async function sendData(incident, location) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ incident, location })
                });

                const data = await response.json();
                console.log("N8N Response:", data);

                // FIX: Ensure we handle the key correctly
                const finalMsg = data.ai_response || data.text || "Help is on the way. Stay calm.";
                
                document.getElementById('response-box').classList.remove('hidden');
                document.getElementById('ai-msg').innerText = finalMsg;

                // Voice
                speak(finalMsg);

            } catch (err) {
                console.error("Fetch Error:", err);
                alert("Connection failed. Ensure n8n workflow is ACTIVE.");
            } finally {
                document.getElementById('sos-btn').disabled = false;
                document.getElementById('sos-btn').innerText = "Activate Response";
            }
        }

        async function speak(text) {
            try {
                const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL`, {
                    method: 'POST',
                    headers: { 'xi-api-key': EL_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, model_id: "eleven_monolingual_v1" })
                });
                const blob = await res.blob();
                new Audio(URL.createObjectURL(blob)).play();
            } catch (e) {
                const utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
