<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Hour AI • Emergency Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 28px; } }
    body { font-family: 'Inter', system-ui; }
    .emergency-btn { animation: pulse 1.5s infinite; }
    .listening-bar { animation: wave 0.8s infinite ease-in-out; }
  </style>
</head>
<body class="bg-red-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-heart-pulse text-4xl text-red-500"></i>
        <h1 class="text-4xl font-bold tracking-tight">Golden Hour AI</h1>
      </div>
      <div class="flex items-center gap-2 bg-red-900 px-4 py-2 rounded-2xl">
        <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
        <span class="font-medium">Live • Ready to Save Lives</span>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Main Panel -->
      <div class="lg:col-span-2 bg-red-900/50 backdrop-blur-xl rounded-3xl p-8 border border-red-500/30">
        <!-- Voice Button -->
        <div class="flex flex-col items-center text-center mb-8">
          <button onclick="startVoice()" id="voiceBtn"
            class="emergency-btn w-64 h-64 flex items-center justify-center bg-red-600 hover:bg-red-700 text-white text-2xl font-bold rounded-3xl shadow-2xl border-8 border-red-400 transition-all">
            <i class="fa-solid fa-microphone fa-3x mr-4"></i>
            SPEAK NOW
          </button>
          <p id="statusText" class="mt-6 text-xl font-semibold text-red-300">Voice or Text • I'm listening</p>
        </div>

        <!-- Listening animation -->
        <div id="listeningUI" class="hidden flex justify-center gap-1 mb-8">
          <div class="listening-bar w-4 bg-red-400 rounded"></div>
          <div class="listening-bar w-4 bg-red-400 rounded" style="animation-delay: 150ms"></div>
          <div class="listening-bar w-4 bg-red-400 rounded" style="animation-delay: 300ms"></div>
          <div class="listening-bar w-4 bg-red-400 rounded" style="animation-delay: 450ms"></div>
          <div class="listening-bar w-4 bg-red-400 rounded" style="animation-delay: 600ms"></div>
        </div>

        <!-- Text Input (NEW) -->
        <div class="mt-8">
          <h3 class="font-semibold mb-3 text-emerald-400">OR type your emergency</h3>
          <div class="flex gap-3">
            <input id="textInput" type="text" 
              class="flex-1 bg-white/10 border border-white/20 rounded-3xl px-6 py-4 text-white placeholder:text-white/50 focus:outline-none focus:border-emerald-400"
              placeholder="I have severe chest pain...">
            <button onclick="sendText()" 
              class="bg-emerald-600 hover:bg-emerald-700 px-10 rounded-3xl font-semibold">SEND</button>
          </div>
        </div>

        <div id="transcriptBox" class="mt-8 bg-black/30 rounded-2xl p-6 min-h-[120px] text-lg italic"></div>

        <div id="responsePanel" class="hidden mt-8 bg-white/10 rounded-2xl p-6">
          <h3 class="font-semibold text-emerald-400 mb-3">AI Assistant says:</h3>
          <p id="aiResponseText" class="text-xl leading-relaxed"></p>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-6">
        <div id="triageCard" class="hidden bg-gradient-to-br from-red-600 to-orange-600 rounded-3xl p-6 text-center">
          <h3 class="text-sm uppercase tracking-widest">Triage Level</h3>
          <div id="triageBadge" class="inline-block mt-3 px-8 py-3 text-3xl font-bold rounded-2xl">IMMEDIATE</div>
        </div>

        <div class="bg-white/10 rounded-3xl p-6">
          <h3 class="font-semibold mb-4 flex items-center"><i class="fa-solid fa-list-check mr-2"></i> Live First-Aid Steps</h3>
          <ol id="stepsList" class="space-y-4 text-sm"></ol>
        </div>

        <div class="bg-white/10 rounded-3xl p-6">
          <h3 class="font-semibold mb-2">Your Location</h3>
          <p id="locationText" class="text-emerald-400 font-mono text-sm"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const webhookUrl = "https://bb01001.app.n8n.cloud/webhook/golden-hour-ai"; // ← REPLACE AFTER IMPORT
    let currentLat = 18.5822, currentLng = 73.9862;
    let synth = window.speechSynthesis;

    async function getLocation() {
      return new Promise(resolve => {
        navigator.geolocation.getCurrentPosition(p => {
          currentLat = p.coords.latitude;
          currentLng = p.coords.longitude;
          document.getElementById("locationText").innerHTML = `📍 ${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
          resolve();
        }, () => resolve());
      });
    }

    async function sendPayload(transcript) {
      await getLocation();
      const payload = {
        userName: "Bhup",
        latitude: currentLat,
        longitude: currentLng,
        transcript: transcript,
        familyEmail: "family@example.com"
      };

      const res = await fetch(webhookUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const aiData = await res.json();

      // Show response
      document.getElementById("responsePanel").classList.remove("hidden");
      document.getElementById("aiResponseText").innerHTML = aiData.user_response || "Help is on the way.";

      // Speak
      const utterance = new SpeechSynthesisUtterance(aiData.user_response);
      synth.speak(utterance);

      // Triage
      if (aiData.triage_level) {
        const card = document.getElementById("triageCard");
        card.classList.remove("hidden");
        document.getElementById("triageBadge").textContent = aiData.triage_level.toUpperCase();
      }

      // Steps
      if (aiData.first_aid_steps && aiData.first_aid_steps.length) {
        const ol = document.getElementById("stepsList");
        ol.innerHTML = aiData.first_aid_steps.map((s, i) => `<li class="flex gap-3"><span class="font-mono text-red-400">${i+1}.</span> ${s}</li>`).join('');
      }
    }

    // Voice mode
    let recognition;
    function startVoice() {
      document.getElementById("statusText").innerHTML = `<span class="text-red-400">LISTENING...</span>`;
      document.getElementById("listeningUI").classList.remove("hidden");

      if (!recognition) {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "en-IN";
        recognition.onresult = e => {
          const transcript = e.results[0][0].transcript;
          document.getElementById("transcriptBox").innerHTML = `<strong>You said:</strong> ${transcript}`;
          document.getElementById("listeningUI").classList.add("hidden");
          sendPayload(transcript);
        };
      }
      recognition.start();
    }

    // Text mode (NEW)
    function sendText() {
      const input = document.getElementById("textInput");
      const transcript = input.value.trim();
      if (!transcript) return alert("Please type something");
      document.getElementById("transcriptBox").innerHTML = `<strong>You typed:</strong> ${transcript}`;
      input.value = "";
      sendPayload(transcript);
    }
  </script>
</body>
</html>
