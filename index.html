<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hour AI | Emergency Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .animate-bounce-in { animation: bounceIn 0.5s ease-out; }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-800 p-4 bg-slate-900 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 p-2 rounded-lg"><i class="fas fa-heartbeat text-white"></i></div>
            <span class="font-bold tracking-tighter text-xl uppercase">Golden Hour <span class="text-red-500">AI</span></span>
        </div>
        <div class="flex gap-2">
            <button onclick="switchTab('user')" class="px-4 py-1.5 text-xs font-bold bg-slate-800 rounded-full hover:bg-slate-700 transition">USER MODE</button>
            <button onclick="switchTab('hospital')" class="px-4 py-1.5 text-xs font-bold bg-slate-800 rounded-full hover:bg-slate-700 transition">HOSPITAL FEED</button>
        </div>
    </nav>

    <main id="user-tab" class="max-w-xl mx-auto p-6 transition-all duration-300">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold mb-2">Emergency Response</h1>
            <p class="text-slate-400">Describe the situation or press SOS to begin.</p>
        </div>

        <div id="sos-btn" onclick="document.getElementById('desc').focus()" class="pulse w-32 h-32 bg-red-600 rounded-full mx-auto mb-8 flex items-center justify-center cursor-pointer border-4 border-red-500 shadow-2xl transition-transform hover:scale-105">
            <span class="font-black text-2xl text-white">SOS</span>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
            <label class="block text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wider">What is happening?</label>
            <textarea id="desc" placeholder="Ex: A person has collapsed and is not breathing..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:ring-2 focus:ring-red-500 outline-none h-32 mb-4 transition-all"></textarea>
            
            <button onclick="sendEmergency()" id="submit-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl transition-all flex items-center justify-center gap-3 uppercase shadow-lg">
                <i class="fas fa-paper-plane"></i> Activate AI Triage
            </button>
        </div>

        <div id="response-card" class="hidden mt-6 bg-white rounded-2xl p-6 border-l-8 border-red-600 animate-bounce-in shadow-2xl">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-slate-900 font-black text-lg flex items-center gap-2">
                    <i class="fas fa-robot text-red-600"></i> AI LIFE-SAVER GUIDE
                </h3>
                <span class="bg-red-100 text-red-700 text-[10px] font-black px-2 py-1 rounded-full uppercase">Audio Priority</span>
            </div>
            <p id="ai-text" class="text-slate-800 text-xl leading-relaxed font-bold mb-4"></p>
            <div class="text-[10px] text-slate-400 border-t pt-4 uppercase font-bold tracking-widest">Hospital & Dispatch Notified • Stay Calm</div>
        </div>
    </main>

    <main id="hospital-tab" class="hidden max-w-5xl mx-auto p-6">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black text-blue-400 uppercase tracking-tighter"><i class="fas fa-broadcast-tower mr-2"></i>Live Triage Monitor</h2>
            <div class="text-[10px] font-bold bg-blue-900/30 text-blue-400 px-3 py-1 rounded-full border border-blue-800 uppercase tracking-widest animate-pulse">System Active</div>
        </div>
        
        <div class="grid gap-4" id="feed-container">
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex justify-between items-center opacity-40">
                <div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase">Station Status</div>
                    <div class="font-bold text-slate-300">Awaiting incident data...</div>
                </div>
                <i class="fas fa-spinner fa-spin text-slate-700"></i>
            </div>
        </div>
    </main>

    <div class="fixed bottom-4 right-4 group">
        <button class="bg-slate-800 p-3 rounded-full opacity-30 group-hover:opacity-100 transition shadow-lg"><i class="fas fa-key"></i></button>
        <div class="absolute bottom-12 right-0 bg-slate-900 border border-slate-800 p-4 rounded-xl hidden group-hover:block w-64 shadow-2xl">
            <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">ElevenLabs API Key</label>
            <input type="password" id="el-key" placeholder="Paste Key for Voice" class="w-full text-xs bg-black p-2 rounded border border-slate-700 focus:border-blue-500 outline-none">
            <p class="text-[9px] text-slate-600 mt-2 font-medium">Leave empty to use standard system voice.</p>
        </div>
    </div>

    <script>
        // YOUR OFFICIAL WEBHOOK URL
        const N8N_WEBHOOK_URL = "https://bb101.app.n8n.cloud/webhook-test/emergency-trigger";
        let locationData = "Detecting GPS...";

        // 1. Capture Location
        navigator.geolocation.getCurrentPosition(p => {
            locationData = `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
        }, () => { locationData = "Location Access Denied"; });

        function switchTab(tab) {
            document.getElementById('user-tab').classList.toggle('hidden', tab !== 'user');
            document.getElementById('hospital-tab').classList.toggle('hidden', tab !== 'hospital');
        }

        // 2. Communication Logic
        async function sendEmergency() {
            const desc = document.getElementById('desc').value;
            const btn = document.getElementById('submit-btn');

            if (!desc) return alert("Please describe the emergency.");

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> Processing Triage...`;

            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        incident: desc, 
                        location: locationData,
                        timestamp: new Date().toLocaleTimeString() 
                    })
                });
                
                const data = await res.json();
                const aiResponse = data.ai_response || "Stand by for instructions.";

                // Show UI Response
                document.getElementById('response-card').classList.remove('hidden');
                document.getElementById('ai-text').innerText = aiResponse;

                // Voice Assist
                handleVoice(aiResponse);

                // Update Hospital Feed
                updateHospitalFeed(desc, aiResponse);

            } catch (e) {
                console.error(e);
                alert("Connection Error. Is your n8n workflow active?");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-paper-plane"></i> Activate AI Triage`;
            }
        }

        // 3. Audio Engine
        async function handleVoice(text) {
            const key = document.getElementById('el-key').value;
            if(!key) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
                return;
            }

            const VOICE_ID = 'EXAVITQu4vr4xnSDxMaL'; // Bella (Clear/Professional)
            try {
                const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                    method: 'POST',
                    headers: { 'xi-api-key': key, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, model_id: "eleven_monolingual_v1" })
                });
                const blob = await res.blob();
                new Audio(URL.createObjectURL(blob)).play();
            } catch (err) {
                console.warn("ElevenLabs failed, using system voice.");
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
            }
        }

        function updateHospitalFeed(incident, response) {
            const container = document.getElementById('feed-container');
            const div = document.createElement('div');
            div.className = "bg-slate-900 p-5 rounded-xl border-l-4 border-red-500 flex justify-between items-center animate-bounce-in shadow-lg mb-4";
            div.innerHTML = `
                <div>
                    <div class="text-[10px] text-red-500 font-black uppercase tracking-widest mb-1 italic">High Priority Alert</div>
                    <div class="font-bold text-lg text-white mb-1">${incident}</div>
                    <div class="text-[10px] text-slate-500 font-bold uppercase"><i class="fas fa-map-marker-alt mr-1"></i> ${locationData}</div>
                </div>
                <div class="text-right">
                    <button class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg text-xs font-black uppercase shadow-lg transition">Dispatch</button>
                </div>
            `;
            container.prepend(div);
        }
    </script>
</body>
</html>
